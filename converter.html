<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер валют | Марк Андреев</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container nav">
            <div class="logo">Марк Андреев</div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Главная</a></li>
                <li><a href="index.html#about">Обо мне</a></li>
                <li><a href="index.html#skills">Навыки</a></li>
                <li><a href="index.html#projects">Проекты</a></li>
                <li><a href="index.html#contact">Контакты</a></li>
                <li><a href="converter.html">Конвертер</a></li>
            </ul>
            <div class="burger" id="burger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main>
        <section class="hero" style="padding: 4rem 0;">
            <div class="container">
                <h1 class="hero-title">Конвертер <span class="gold">валют</span></h1>
                <p class="hero-subtitle">Курсы с Московской биржи (данные ЦБ РФ)</p>
            </div>
        </section>

        <section class="converter-section">
            <div class="container">
                <div class="converter-card">
                    <div class="converter-form">
                        <div class="input-group">
                            <label for="amount">Сумма</label>
                            <input type="number" id="amount" value="1" min="0" step="0.01">
                        </div>

                        <div class="input-group">
                            <label for="fromCurrency">Из</label>
                            <select id="fromCurrency"></select>
                        </div>

                        <div class="input-group">
                            <label for="toCurrency">В</label>
                            <select id="toCurrency"></select>
                        </div>

                        <button id="convertBtn" class="btn-primary">Конвертировать</button>
                        <button id="refreshRates" class="btn-secondary">Обновить курсы</button>
                    </div>

                    <div class="result-area">
                        <p id="result">Введите сумму и нажмите "Конвертировать"</p>
                        <p id="lastUpdate"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Марк Андреев. Данные предоставлены ЦБ РФ.</p>
        </div>
    </footer>

    <!-- Скрипт конвертера -->
    <script>
        let rates = {};
        let currencies = [];

        const amountInput = document.getElementById('amount');
        const fromSelect = document.getElementById('fromCurrency');
        const toSelect = document.getElementById('toCurrency');
        const convertBtn = document.getElementById('convertBtn');
        const refreshBtn = document.getElementById('refreshRates');
        const resultP = document.getElementById('result');
        const lastUpdateP = document.getElementById('lastUpdate');

        async function fetchRates() {
            try {
                const response = await fetch('https://www.cbr-xml-daily.ru/daily_json.js');
                const data = await response.json();

                rates = { RUB: 1 };
                currencies = ['RUB'];

                for (let code in data.Valute) {
                    rates[code] = data.Valute[code].Value;
                    currencies.push(code);
                }

                currencies.sort();
                populateSelects();

                const updateTime = new Date(data.Date).toLocaleString('ru-RU');
                lastUpdateP.textContent = `Последнее обновление: ${updateTime}`;
            } catch (error) {
                console.error(error);
                rates = { RUB: 1, USD: 90.0, EUR: 99.0, CNY: 12.5 };
                currencies = ['RUB', 'USD', 'EUR', 'CNY'];
                populateSelects();
                lastUpdateP.textContent = 'Не удалось загрузить актуальные курсы. Используются тестовые.';
            }
        }

        function populateSelects() {
            fromSelect.innerHTML = '';
            toSelect.innerHTML = '';

            currencies.forEach(function(curr) {
                let option1 = document.createElement('option');
                option1.value = curr;
                option1.textContent = curr;
                fromSelect.appendChild(option1);

                let option2 = document.createElement('option');
                option2.value = curr;
                option2.textContent = curr;
                toSelect.appendChild(option2);
            });

            fromSelect.value = 'USD';
            toSelect.value = 'RUB';
        }

        function convert() {
            let amount = parseFloat(amountInput.value) || 0;
            let from = fromSelect.value;
            let to = toSelect.value;

            if (!rates[from] || !rates[to]) {
                resultP.textContent = 'Ошибка: неизвестная валюта';
                return;
            }

            let result = (amount * rates[from]) / rates[to];
            resultP.textContent = `${amount} ${from} = ${result.toFixed(4)} ${to}`;
        }

        convertBtn.addEventListener('click', convert);
        refreshBtn.addEventListener('click', function() {
            fetchRates().then(function() { convert(); });
        });

        fetchRates().then(function() { convert(); });
    </script>
    <!-- Общий скрипт -->
    <script src="script.js"></script>
</body>
</html>
